# =============================================================================
# B&R Capital Dashboard - Nginx Configuration (Full)
# =============================================================================
# Alternative full nginx.conf for advanced deployments
# This file can be mounted as /etc/nginx/nginx.conf for more control
# Default setup uses the simpler /nginx.conf mounted to conf.d/default.conf
#
# Certificate paths (mounted via docker-compose volume):
#   /etc/nginx/ssl/fullchain.pem  - Full certificate chain (cert + intermediates)
#   /etc/nginx/ssl/privkey.pem    - Private key
#   /etc/nginx/ssl/chain.pem      - Intermediate CA chain (for OCSP stapling)
#   /etc/nginx/ssl/dhparam.pem    - DH parameters (generate: openssl dhparam -out dhparam.pem 2048)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging Configuration
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance Optimizations
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # -------------------------------------------------------------------------
    # Security Headers (applied globally)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection set to 0 per OWASP recommendation -- the "1; mode=block"
    # value can introduce XSS vulnerabilities in older browsers. Modern browsers
    # ignore this header; CSP is the proper mitigation.
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # -------------------------------------------------------------------------
    # Rate Limiting
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # Upstream Backend
    # -------------------------------------------------------------------------
    upstream backend {
        least_conn;
        server backend:8000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP -> HTTPS Redirect
    # -------------------------------------------------------------------------
    # All HTTP traffic is permanently redirected to HTTPS except the health
    # check endpoint, which must remain on port 80 for Docker healthchecks
    # and load balancer probes that cannot follow redirects.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check on port 80 for Docker/orchestrator probes
        location /health {
            access_log off;
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS Server Block
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # -----------------------------------------------------------------
        # TLS Certificate Configuration
        # -----------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # -----------------------------------------------------------------
        # TLS Protocol and Cipher Configuration
        # -----------------------------------------------------------------
        # Only TLSv1.2 and TLSv1.3 -- older protocols have known
        # vulnerabilities. Cipher list follows Mozilla "Intermediate"
        # profile for broad compatibility while maintaining strong
        # security. TLSv1.3 ciphers are not configurable via ssl_ciphers
        # (they use their own negotiation).
        # Reference: https://ssl-config.mozilla.org/
        # -----------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_ecdh_curve secp384r1;

        # DH parameters for DHE cipher suites (forward secrecy)
        # Generate with: openssl dhparam -out certs/dhparam.pem 2048
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        # -----------------------------------------------------------------
        # TLS Session Configuration
        # -----------------------------------------------------------------
        # Session cache reduces TLS handshake overhead for returning
        # clients. Tickets are disabled because they can weaken forward
        # secrecy -- session resumption via the shared cache is sufficient.
        # -----------------------------------------------------------------
        ssl_session_timeout 1d;
        ssl_session_cache shared:TLS:10m;
        ssl_session_tickets off;

        # -----------------------------------------------------------------
        # OCSP Stapling
        # -----------------------------------------------------------------
        # Nginx fetches and caches the OCSP response from the CA, then
        # staples it to the TLS handshake. This avoids the client making
        # a separate OCSP request, improving connection latency and
        # privacy. The ssl_trusted_certificate should contain the
        # intermediate CA chain.
        # -----------------------------------------------------------------
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # -----------------------------------------------------------------
        # HSTS (HTTP Strict Transport Security)
        # -----------------------------------------------------------------
        # Instructs browsers to only connect via HTTPS for 2 years.
        # includeSubDomains and preload enable HSTS prelist submission.
        # WARNING: Only add 'preload' after confirming all subdomains
        # support HTTPS. Removal from the preload list takes months.
        # -----------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # -----------------------------------------------------------------
        # API Proxy - Route /api/* to backend
        # -----------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://backend/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            proxy_cache_bypass $http_upgrade;
        }

        # -----------------------------------------------------------------
        # WebSocket Proxy
        # -----------------------------------------------------------------
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # -----------------------------------------------------------------
        # Health Check Endpoint
        # -----------------------------------------------------------------
        location /health {
            access_log off;
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------
        # Backend Health Proxy (for container orchestration)
        # -----------------------------------------------------------------
        location /api/health {
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # -----------------------------------------------------------------
        # Static Assets with Long Cache
        # -----------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # -----------------------------------------------------------------
        # SPA Routing - Fallback to index.html
        # -----------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;

            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
                add_header X-Frame-Options "DENY" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "0" always;
            }
        }

        # -----------------------------------------------------------------
        # Error Pages
        # -----------------------------------------------------------------
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
