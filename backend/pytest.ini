[pytest]
# Pytest configuration for B&R Capital Backend

# Run asyncio tests with proper loop scope (required for pytest-asyncio 0.23+)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test paths
testpaths = tests

# Python file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Add options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=30
    --timeout=60
    --timeout-method=thread
    -m "not slow and not pg and not benchmark and not performance"

# Markers
markers =
    asyncio: mark test as async
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    pg: PostgreSQL integration tests (require running PG instance via TEST_DATABASE_URL)
    benchmark: marks tests as pytest-benchmark micro-benchmarks (deselect with '-m "not benchmark"')
    performance: marks tests as response-time performance assertions (deselect with '-m "not performance"')

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
